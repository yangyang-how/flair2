name: Terraform

on:
  pull_request:
    branches: [main]
    paths:
      - "terraform/**"
  push:
    branches: [main]
    paths:
      - "terraform/**"
  # Manual trigger for plan/apply — needed because Learner Lab creds expire every few hours
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action to run"
        required: true
        default: "plan"
        type: choice
        options:
          - plan
          - apply

defaults:
  run:
    working-directory: terraform

jobs:
  # ── Validate (no AWS creds needed) ──────────────────────────────────────────
  # Runs on every PR and push touching terraform/. Catches syntax errors early.
  validate:
    name: Validate + Format check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.6"

      - name: Init (no backend — syntax check only)
        run: terraform init -backend=false

      - name: Validate
        run: terraform validate

      - name: Format check
        run: terraform fmt -check -recursive

  # ── Plan (needs AWS creds) ───────────────────────────────────────────────────
  # Runs on PRs + manual dispatch. Shows what would change before applying.
  # NOTE: Learner Lab creds expire every ~4-8 hrs — update secrets before running.
  plan:
    name: Plan (dev)
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && github.event.inputs.action != 'apply')
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
      AWS_DEFAULT_REGION: us-west-2

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.6"

      - name: Init
        run: terraform init -backend-config="key=env/dev/terraform.tfstate"

      - name: Plan
        run: terraform plan -var="env=dev" -no-color
        continue-on-error: false

  # ── Apply (manual only, needs AWS creds) ────────────────────────────────────
  # Only runs via workflow_dispatch with action=apply.
  # Update AWS secrets with fresh Learner Lab creds before triggering.
  apply:
    name: Apply (dev)
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply'
    environment: dev  # optional: adds a manual approval gate in GitHub
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
      AWS_DEFAULT_REGION: us-west-2

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.6"

      - name: Init
        run: terraform init -backend-config="key=env/dev/terraform.tfstate"

      - name: Apply
        run: terraform apply -var="env=dev" -auto-approve -no-color
