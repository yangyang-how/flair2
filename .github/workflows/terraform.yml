name: Terraform

on:
  pull_request:
    branches: [main]
    paths:
      - "terraform/**"
  push:
    branches: [main]
    paths:
      - "terraform/**"
  # Manual trigger for plan/apply — needed because Learner Lab creds expire every few hours
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action to run"
        required: true
        default: "plan"
        type: choice
        options:
          - bootstrap
          - plan
          - apply

defaults:
  run:
    working-directory: terraform

jobs:
  # ── Validate (no AWS creds needed) ──────────────────────────────────────────
  # Runs on every PR and push touching terraform/. Catches syntax errors early.
  validate:
    name: Validate + Format check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.6"

      - name: Init (no backend — syntax check only)
        run: terraform init -backend=false

      - name: Validate
        run: terraform validate

      - name: Format check
        run: terraform fmt -check -recursive

  # ── Plan (needs AWS creds) ───────────────────────────────────────────────────
  # Runs on PRs + manual dispatch. Shows what would change before applying.
  # NOTE: Learner Lab creds expire every ~4-8 hrs — update secrets before running.
  # ── Bootstrap (one-time, manual only) ───────────────────────────────────────
  # Creates the S3 bucket that stores Terraform state.
  # Must run once before any plan/apply. Idempotent — safe to re-run.
  bootstrap:
    name: Bootstrap state bucket
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'bootstrap'
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
      AWS_DEFAULT_REGION: us-west-2

    steps:
      - name: Create S3 state bucket (idempotent)
        working-directory: .
        run: |
          if aws s3api head-bucket --bucket flair2-terraform-state 2>/dev/null; then
            echo "Bucket already exists — skipping creation"
          else
            aws s3api create-bucket \
              --bucket flair2-terraform-state \
              --region us-west-2 \
              --create-bucket-configuration LocationConstraint=us-west-2
            aws s3api put-bucket-versioning \
              --bucket flair2-terraform-state \
              --versioning-configuration Status=Enabled
            echo "Bucket created and versioning enabled"
          fi

  # ── Plan (needs AWS creds) ───────────────────────────────────────────────────
  # Runs on PRs + manual dispatch. Shows what would change before applying.
  # NOTE: Learner Lab creds expire every ~4-8 hrs — update secrets before running.
  plan:
    name: Plan (dev)
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'plan')
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
      AWS_DEFAULT_REGION: us-west-2

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.6"

      - name: Init
        run: terraform init -backend-config="key=env/dev/terraform.tfstate"

      - name: Plan
        run: terraform plan -var-file=environments/dev.tfvars -no-color
        continue-on-error: false

  # ── Apply (manual only, needs AWS creds) ────────────────────────────────────
  # Only runs via workflow_dispatch with action=apply.
  # Update AWS secrets with fresh Learner Lab creds before triggering.
  apply:
    name: Apply (dev)
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply'
    environment: dev  # optional: adds a manual approval gate in GitHub
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
      AWS_DEFAULT_REGION: us-west-2

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.6"

      - name: Init
        run: terraform init -backend-config="key=env/dev/terraform.tfstate"

      - name: Apply
        run: terraform apply -var-file=environments/dev.tfvars -auto-approve -no-color
