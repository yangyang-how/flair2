name: Deploy

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - "terraform/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

env:
  AWS_REGION: us-west-2
  ECR_REGISTRY: 314727362981.dkr.ecr.us-west-2.amazonaws.com
  ECR_API_REPO: flair2-dev-api
  ECR_WORKER_REPO: flair2-dev-worker
  ECS_CLUSTER: flair2-dev-cluster
  ECS_API_SERVICE: flair2-dev-api
  ECS_WORKER_SERVICE: flair2-dev-worker
  FRONTEND_S3_BUCKET: flair2-dev-frontend
  TF_VERSION: "1.9.0"
  TF_WORKING_DIR: terraform
  TF_VAR_FILE: environments/dev.tfvars

jobs:
  # ── Build Docker image + push to ECR ──────────────────────────────────────
  # Runs in parallel with terraform. Deploy waits for both.
  build-backend:
    name: Build — Docker → ECR
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: |
          docker build \
            --tag $ECR_REGISTRY/$ECR_API_REPO:${{ github.sha }} \
            --tag $ECR_REGISTRY/$ECR_API_REPO:latest \
            --tag $ECR_REGISTRY/$ECR_WORKER_REPO:${{ github.sha }} \
            --tag $ECR_REGISTRY/$ECR_WORKER_REPO:latest \
            ./backend

      - name: Push to ECR
        run: |
          docker push $ECR_REGISTRY/$ECR_API_REPO:${{ github.sha }}
          docker push $ECR_REGISTRY/$ECR_API_REPO:latest
          docker push $ECR_REGISTRY/$ECR_WORKER_REPO:${{ github.sha }}
          docker push $ECR_REGISTRY/$ECR_WORKER_REPO:latest

  # ── Terraform apply ───────────────────────────────────────────────────────
  # Creates new task definition revisions when the terraform source changes
  # (e.g. Celery command, CPU/memory sizing, env vars). Idempotent — a no-op
  # on pure code PRs, ~15-30s. Runs in parallel with build-backend.
  terraform:
    name: Infra — terraform apply
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init -input=false

      - name: Terraform apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -auto-approve -input=false -var-file=${{ env.TF_VAR_FILE }}

  # ── Deploy to ECS ─────────────────────────────────────────────────────────
  # Waits for BOTH the new image (from build) and the new task definition
  # revision (from terraform) to exist before rolling the ECS services.
  # Using --task-definition <family> (no :revision) tells ECS to use the
  # latest ACTIVE revision — the one terraform just minted.
  deploy-backend:
    name: Deploy — roll ECS services
    runs-on: ubuntu-latest
    needs: [build-backend, terraform]

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update API service (latest task def + force new deployment)
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_API_SERVICE \
            --task-definition $ECS_API_SERVICE \
            --force-new-deployment \
            --region $AWS_REGION \
            --no-cli-pager

      - name: Update worker service (latest task def + force new deployment)
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_WORKER_SERVICE \
            --task-definition $ECS_WORKER_SERVICE \
            --force-new-deployment \
            --region $AWS_REGION \
            --no-cli-pager

      - name: Wait for services to stabilize
        run: |
          echo "Waiting for API service..."
          aws ecs wait services-stable \
            --cluster $ECS_CLUSTER \
            --services $ECS_API_SERVICE \
            --region $AWS_REGION

          echo "Waiting for worker service..."
          aws ecs wait services-stable \
            --cluster $ECS_CLUSTER \
            --services $ECS_WORKER_SERVICE \
            --region $AWS_REGION

          echo "Backend deploy complete."

  # ── Frontend ──────────────────────────────────────────────────────────────
  deploy-frontend:
    name: Frontend — Build → S3
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get ALB URL
        id: alb
        run: |
          ALB_DNS=$(aws elbv2 describe-load-balancers --region $AWS_REGION \
            --query 'LoadBalancers[?LoadBalancerName==`flair2-dev-alb`].DNSName' \
            --output text)
          echo "url=http://${ALB_DNS}" >> $GITHUB_OUTPUT

      - name: Build frontend
        run: cd frontend && npm run build
        env:
          PUBLIC_API_URL: ${{ steps.alb.outputs.url }}

      - name: Upload to S3
        run: |
          aws s3 sync frontend/dist/ s3://$FRONTEND_S3_BUCKET/ \
            --delete \
            --region $AWS_REGION

      - name: Print frontend URL
        run: echo "Frontend deployed to http://$FRONTEND_S3_BUCKET.s3-website-$AWS_REGION.amazonaws.com"
